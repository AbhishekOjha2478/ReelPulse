name: ReelPulse Pipeline

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install deno (JS runtime yt-dlp needs for YouTube token generation)
        run: |
          curl -fsSL https://deno.land/install.sh | sh -s -- -y
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"

      - name: Write credential files from secrets
        run: |
          mkdir -p data
          echo "${{ secrets.YT_CLIENT_SECRET_B64 }}" | base64 -d > client_secret.json
          echo "${{ secrets.YT_OAUTH_TOKEN_B64 }}" | base64 -d > data/youtube_oauth_token.json

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CHANNEL_BRAND_NAME: ${{ vars.CHANNEL_BRAND_NAME }}
          DRY_RUN: ${{ vars.DRY_RUN }}
          DEFAULT_PRIVACY_STATUS: ${{ vars.DEFAULT_PRIVACY_STATUS }}
        run: python -m app.scheduler

      - name: Remove decoded credential files before committing
        if: always()
        run: rm -f client_secret.json data/youtube_oauth_token.json

      - name: Commit updated state + dashboard
        if: always()
        run: |
          git config user.name "cc-publisher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/pipeline.db docs
          git diff --cached --quiet || git commit -m "Pipeline run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Check whether this run degraded or failed
        if: always()
        id: alert_check
        run: |
          RESULT=$(python -m app.check_alerts)
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Ensure alert label exists
        if: always() && startsWith(steps.alert_check.outputs.result, 'ALERT')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh label create pipeline-alert --color FF0000 --description "Automated pipeline degradation/failure alert" --force

      - name: Open or update alert issue
        if: always() && startsWith(steps.alert_check.outputs.result, 'ALERT')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="${{ steps.alert_check.outputs.result }}

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --label pipeline-alert --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "$BODY"
          else
            gh issue create --repo "${{ github.repository }}" --title "ReelPulse pipeline needs attention" --label pipeline-alert --body "$BODY"
          fi
